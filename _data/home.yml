about:
  heading: About
  subheading: “I’m Orion, a transgender man and tattoo artist inspired by American traditional tattooing, nature, and timeless artwork that tells a story. I strive to create bold, clean tattoos in a welcoming, judgment-free space where everyone - especially LGBTQ+ client - can feel comfortable being themselves. Whether it’s a meaningful custom piece or a classic design, my goal is to collaborate with you to create a tattoo you’ll be proud to wear for years to come.”
  image: img/about/about.jpg
   
